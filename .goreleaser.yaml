version: 2

project_name: claude-reader

# Build the web SPA once, before cross-compiling.
before:
  hooks:
    - cd web && npm ci
    - cd web && npm run build
    - sh -c 'rm -rf internal/web/dist && mkdir -p internal/web/dist && cp -r web/dist/* internal/web/dist/'
    - go mod tidy

builds:
  - id: claude-reader
    main: ./cmd/claude-reader
    binary: claude-reader
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/zhiyand/claude-reader/internal/version.version={{.Version}}
      - -X github.com/zhiyand/claude-reader/internal/version.commit={{.ShortCommit}}
      - -X github.com/zhiyand/claude-reader/internal/version.date={{.Date}}
    goos: [darwin, linux]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "^Merge pull request"

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

brews:
  - name: claude-reader
    # Replace with your actual tap repo before the first tag.
    repository:
      owner: zhiyand
      name: homebrew-tap
      branch: main
    directory: Formula
    homepage: "https://github.com/zhiyand/claude-reader"
    description: "Browse your local Claude Code session history through a polished, private web UI."
    license: "MIT"
    install: |
      bin.install "claude-reader"
    test: |
      system "#{bin}/claude-reader", "--version"
