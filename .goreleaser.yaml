version: 2

project_name: cc-inspector

# Build the web SPA once, before cross-compiling.
before:
  hooks:
    - sh -c 'cd web && npm ci'
    - sh -c 'cd web && npm run build'
    - sh -c 'rm -rf internal/web/dist && mkdir -p internal/web/dist && cp -r web/dist/* internal/web/dist/'
    - go mod tidy

builds:
  - id: cc-inspector
    main: ./cmd/cc-inspector
    binary: cc-inspector
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/offbeatengineer/cc-inspector/internal/version.version={{.Version}}
      - -X github.com/offbeatengineer/cc-inspector/internal/version.commit={{.ShortCommit}}
      - -X github.com/offbeatengineer/cc-inspector/internal/version.date={{.Date}}
    goos: [darwin, linux]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "^Merge pull request"

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

brews:
  - name: cc-inspector
    repository:
      owner: offbeatengineer
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/offbeatengineer/cc-inspector"
    description: "Browse your local Claude Code session history through a polished, private web UI."
    license: "MIT"
    install: |
      bin.install "cc-inspector"
    test: |
      system "#{bin}/cc-inspector", "--version"
